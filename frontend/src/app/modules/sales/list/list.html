<div class="sales-list-container">

  <div class="header">
    <h2>Lista de Ventas</h2>

    <div class="header-actions">
      <a routerLink="/products" class="btn-back">← Productos</a>
      <a routerLink="/sales/create" class="btn-new">+ Nueva Venta</a>
    </div>
  </div>

  <p class="current-role">
    Rol actual:
    <span class="role-badge" [ngClass]="role.toLowerCase()">
      {{ role }}
    </span>
  </p>

  <p class="loading" *ngIf="loading">Cargando ventas...</p>
  <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

  <div class="table-wrapper" *ngIf="!loading && sales.length > 0">
    <table class="sales-table">
      <thead>
        <tr>
          <th>ID</th>
          <th>Cliente</th>
          <th>Total</th>
          <th>Acción</th>
        </tr>
      </thead>

      <tbody>
        <tr *ngFor="let sale of sales">
          <td>#{{ sale.id }}</td>
          <td>{{ getCustomerName(sale.customerId) }}</td>
          <td class="total">${{ sale.total }}</td>
          <td>
            <a [routerLink]="['/sales/detail', sale.id]" class="btn-detail">
              Ver detalle
            </a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <p class="empty" *ngIf="!loading && sales.length === 0">
    No hay ventas registradas.
  </p>

</div>
